<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habilidades - Giulia Bugatti</title>
  <link rel="stylesheet" href="../css/skills.css">
  <script defer src="../script.js"></script>
  <style>
    .carousel {
      overflow: hidden;
      width: 100%;
      position: relative;
    }
    .carousel-items {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    .skill-page {
      min-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .progress-bar {
      width: 100%;
      background-color: #ddd;
      border-radius: 5px;
      overflow: hidden;
      margin: 5px 0;
    }
    .progress {
      height: 20px;
      background-color: #4CAF50;
      text-align: center;
      color: white;
      line-height: 20px;
    }
    .page-navigation {
      text-align: center;
      margin-top: 10px;
    }
    .nav-dot {
      height: 10px;
      width: 10px;
      margin: 0 5px;
      background-color: gray;
      border-radius: 50%;
      display: inline-block;
      cursor: pointer;
    }
    .nav-dot.active {
      background-color: black;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="back-button">← Voltar para Home</a>
  </header>
  <section id="skills">
    <div class="container">
      <h2>🚀 Minhas Habilidades</h2>
      <div class="carousel">
        <div class="carousel-items">
          <div class="skill-page">
            <div class="skill">
              <p>Python</p>
              <div class="progress-bar"><div class="progress" style="width: 90%;">90%</div></div>
            </div>
          </div>
          <div class="skill-page">
            <div class="skill">
              <p>JavaScript</p>
              <div class="progress-bar"><div class="progress" style="width: 75%;">75%</div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="page-navigation">
        <span class="nav-dot active" onclick="changePage(0)"></span>
        <span class="nav-dot" onclick="changePage(1)"></span>
      </div>
    </div>
  </section>
  <script>
    let currentPage = 0;
    function changePage(index) {
      const carousel = document.querySelector('.carousel-items');
      const dots = document.querySelectorAll('.nav-dot');
      currentPage = index;
      carousel.style.transform = `translateX(-${index * 100}%)`;
      dots.forEach(dot => dot.classList.remove('active'));
      dots[index].classList.add('active');
    }
  </script>
</body>
</html>
