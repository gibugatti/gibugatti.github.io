

  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habilidades - Giulia Bugatti</title>
  <link rel="stylesheet" href="../css/skills.css">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
    <script defer src="../script.js"></script>

   <header>
    <a href="../index.html" class="back-button">← Voltar para Home</a>
  </header>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .carousel-container {
            width: 80%;
            max-width: 500px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .skill {
            margin-bottom: 20px;
        }
        .skill p {
            margin: 0 0 5px;
            font-weight: bold;
        }
        .skill-bar {
            width: 100%;
            background: #ddd;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        .skill-fill {
            height: 100%;
            width: 0;
            background: green;
            transition: width 1.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <div class="carousel">
            <div class="slide">
                <div class="skill">
                    <p>Python</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 90%;"></div></div>
                </div>
                <div class="skill">
                    <p>JavaScript</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 85%;"></div></div>
                </div>
                <div class="skill">
                    <p>SQL</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 80%;"></div></div>
                </div>
                <div class="skill">
                    <p>Machine Learning</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 75%;"></div></div>
                </div>
                <div class="skill">
                    <p>Power BI</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 70%;"></div></div>
                </div>
            </div>
            <div class="slide">
                <div class="skill">
                    <p>React</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 80%;"></div></div>
                </div>
                <div class="skill">
                    <p>C++</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 65%;"></div></div>
                </div>
                <div class="skill">
                    <p>Data Analysis</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 85%;"></div></div>
                </div>
                <div class="skill">
                    <p>Cloud Computing</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 60%;"></div></div>
                </div>
                <div class="skill">
                    <p>AI Development</p>
                    <div class="skill-bar"><div class="skill-fill" style="width: 90%;"></div></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <script>
        $(document).ready(function(){
            $('.carousel').slick({
                dots: true,
                infinite: true,
                speed: 500,
                slidesToShow: 1,
                slidesToScroll: 1,
                autoplay: true,
                autoplaySpeed: 3000
            });
        });
    </script>
</body>
